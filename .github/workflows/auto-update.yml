name: Auto Update Index HTML

on:
  push:
    paths:
      - '**.html' # html 파일이 추가되거나 수정될 때만 작동
      - '!index.html' # index.html 자체가 수정될 때는 무한루프 방지를 위해 제외

jobs:
  update-index:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 필요 라이브러리 설치 (BeautifulSoup)
        run: pip install beautifulsoup4

      - name: 파이썬 자동화 스크립트 실행
        run: python update_index.py

      - name: 수정된 index.html을 깃허브에 자동 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "🤖 Auto-updated index.html with new reports" || echo "No changes to commit"
          git push
