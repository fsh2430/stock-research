<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wal!street | ai research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white border-b border-stone-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tight">wal!street</h1>
                <p class="text-sm text-stone-500 font-medium">ai research</p>
            </div>
            <div id="total-count" class="text-xs font-bold bg-blue-100 text-blue-800 px-3 py-1 rounded-full">
                Total: 4
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto px-6 py-10 w-full">
        <div class="mb-8">
            <h2 class="text-xl font-bold text-stone-900">최신 리포트</h2>
        </div>

        <div id="report-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </main>

    <footer class="bg-white border-t border-stone-200 mt-auto">
        <div class="max-w-6xl mx-auto px-6 py-6 text-center text-xs text-stone-400">
            &copy; 2026 wal!street. All rights reserved.
        </div>
    </footer>

    <script>
        // 1. 실제 파일 내용에 맞춰 데이터를 수정했습니다.
        const reportData = [
            { 
                id: "케이에스피.html", 
                sector: "조선/기계", 
                date: "2026.04.01", 
                title: "케이에스피(KSP)", 
                market: "073010 KOSDAQ", 
                summary: "친환경 선박 슈퍼사이클과 엔진 밸브 시장의 압도적 해자 분석." 
            },
            { 
                id: "원일티엔아이.html", 
                sector: "수소/에너지", 
                date: "2026.04.01", 
                title: "원일티엔아이", 
                market: "136150 KOSDAQ", 
                summary: "독보적인 고밀도 수소저장합금 및 극저온 유체 제어 기술을 바탕으로." 
            },
            { 
                id: "SK하이닉스.html", 
                sector: "반도체·AI 인프라", 
                date: "2026.04.01", 
                title: "SK하이닉스", 
                market: "000660 KOSPI", 
                summary: "AI 인프라 패러다임 전환의 지배자" 
            },
                  { 
                id: "LG전자.html", 
                sector: "가전/플랫폼", 
                date: "2026.04.05", 
                title: "LG전자", 
                market: "066570 KOSPI", 
                summary: "단순 하드웨어 제조의 한계를 초월하여, " 
            },
                { 
                id: "한화생명.html", 
                sector: "보험/금", 
                date: "2026.04.05", 
                title: "한화생명", 
                market: "088350 KOSPI", 
                summary: "제판분리 모멘텀과 자본 규제 하의 수익 구조 전환" 
            }
        ];

        function renderReports() {
            const grid = document.getElementById('report-grid');
            const totalDisplay = document.getElementById('total-count');
            
            totalDisplay.innerText = `Total: ${reportData.length}`;

            grid.innerHTML = reportData.map(report => `
                <a href="${report.id}" class="block bg-white rounded-xl shadow-sm hover:shadow-md border border-stone-200 transition-all hover:-translate-y-1 overflow-hidden group">
                    <div class="h-3 bg-stone-400 group-hover:bg-blue-900 transition-colors"></div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-bold bg-stone-100 text-stone-600 px-2 py-1 rounded">${report.sector}</span>
                            <span class="text-xs text-stone-400">${report.date}</span>
                        </div>
                        <h3 class="text-xl font-bold text-blue-900 mb-1 group-hover:text-blue-700 transition-colors">${report.title}</h3>
                        <p class="text-sm text-stone-500 font-medium mb-4">${report.market}</p>
                        <p class="text-sm text-stone-600 line-clamp-2">${report.summary}</p>
                    </div>
                </a>
            `).join('');
        }

        renderReports();
    </script>
</body>
</html>
